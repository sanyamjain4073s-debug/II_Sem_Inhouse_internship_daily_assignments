<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User API</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-dark">
  <div class="container py-5">
    <h2 class="text-center mb-4">Student Record</h2>
    <input type="text" id="search" class="form-control mb-4" placeholder="search students" />
    <div class="container mt-5">
      <div class="row row-col-5 g-3 " id="container"></div>
    </div>
  </div>
  <script>
    fetch("https://jsonplaceholder.typicode.com/users")
      .then(Response => Response.json())
      .then(data => {
        let html = ""

        for (let i = 0; i < data.length; i++) {

          html += `

        <div class="col-md-4 card item student-card" data-name="${data[i].name.toLowerCase()}">
 
            <div class="card shadow" style="width: 18rem;">

            <div class="card-body text-center">
            
              <img src="https://i.pravatar.cc/150?img=${data[i].id}" class="card-img-top mb-4" alt="students">

              <h5>${data[i].name}</h5>

              <button class="btn btn-primary btn-sm mt-2 show-btn">Show Details</button>

              <div class="details mt-3" style="display:none;">


                <p><strong>ID:</strong> ${data[i].id}</p>

                <p><strong>Username:</strong> ${data[i].username}</p>

                <p><strong>Email:</strong> ${data[i].email}</p>

                <p><strong>Phone:</strong> ${data[i].phone}</p>

                <p><strong>Website:</strong> ${data[i].website}</p>

                <p><strong>Company:</strong> ${data[i].company.name}</p>

                <p><strong>City:</strong> ${data[i].address.city}</p>

              </div>

          </div>

        </div>
    
      </div>

      `;
        }

        $("#container").html(html);

        $("#search").on ("keyup" ,function () {

          let val = $(this).val().toLowerCase();

          $(".student-card").each(function () {

            let name = $(this).attr("data-name");

            if(name.includes(value)){

              $(this).show();

            } else{

              $(this).hide();

            }

          });

        });

        $(".show-btn").click(function () {

          $(this).next(".details").slideToggle();

        });

      })
      .catch(error => console.error(error));

  </script>

</body>

</html>
